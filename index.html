<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>

    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>

</head>

<body>
    <main class="timer">
        <h1>Timer</h1>

        <!-- タイマー表示 -->
        <p id="time">00:00</p>

        <div class="progress">
            <div id="progressBar"></div>
        </div>
            <!-- 視覚的にどれくらい進んだかを示すコード①（/23） -->
        
        <!-- 完了時にメッセージ表示（アラート以外）①（/23） -->
         <p id="message"></p>

        <!-- 入力欄 -->
         <div class="inputs">
            <input type="number" id="minutes" placeholder="分" min="0">
            <input type="number" id="secondsInput" placeholder="秒" min="0" max="59">
         </div>

        <!-- ボタン -->
        <div class="buttons">
            <button id="start">Start</button>
            <button id="stop">Stop</button>
            <button id="reset">Reset</button>
        </div>
    </main>
</body>
</html>
